version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: talent-hub-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: development_password@
      MYSQL_DATABASE: talent-hub
      MYSQL_USER: talenthub-admin
      MYSQL_PASSWORD: development_password@
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: