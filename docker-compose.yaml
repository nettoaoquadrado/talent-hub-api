version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: talent-hub-db
    restart: always
    environment:
      POSTGRES_USER: talenthub-admin
      POSTGRES_PASSWORD: development_password@
      POSTGRES_DB: talent-hub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: talent-hub-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-create-bucket:
    image: minio/mc:latest
    container_name: talent-hub-minio-create-bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      mc mb myminio/talent-hub-storage 2>/dev/null || true;
      echo 'Bucket talent-hub-storage ready';
      "
    restart: "no"

volumes:
  postgres-data:
  minio-data:
